<ion-header [translucent]="true">
   <ion-toolbar>
    <ion-title class="ion-text-center">
      <img src="assets\img\logoText.png" height="60px"/>
    </ion-title>
  </ion-toolbar>
  </ion-header>
  <ion-content [fullscreen]="true">
  <div>
    <ion-card-header>
      <ion-card-title class="ion-text-center">Registrarse</ion-card-title>
        <img src="assets\img\portadaregister.png" height="40%" width="100%" class="ion-text-center"/>
    <ion-input  class="ion-text-center"type="text" placeholder="Usuario"></ion-input>
    <ion-input class="ion-text-center" type="password" placeholder="Contraseña"></ion-input>
    <ion-button class="ion-text-center" >Crear Cuenta</ion-button>
    <ion-label class="ion-text-center">¿Ya tienes una cuenta?</ion-label>
    <ion-button class="ion-text-center" >Iniciar Sesión</ion-button>
    </ion-card-header>
  </div>

</ion-content>
