<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="end">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title class="ion-text-center">
      <img src="assets/img/logoText.png" height="60px"/>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div>
    <ion-card-header>
      <ion-card-title class="ion-text-center">Registrarse</ion-card-title>
      <img src="assets/img/portadaregister.png" height="40%" width="100%" class="ion-text-center"/>
      
      <ion-input class="user" type="text" placeholder="Usuario"></ion-input>
      <ion-input class="password" type="password" placeholder="Contraseña"></ion-input>
      
      <ion-button class="ion-text-center" (click)="setOpen(true)">Crear Cuenta</ion-button>

      <ion-alert
        [isOpen]="isAlertOpen"
        header="¡Cuenta Creada!"
        subHeader="Registro exitoso"
        message="Tu cuenta en Retro Respawn ha sido creada correctamente."
        cssClass="custom-alert-colors"
        [buttons]="alertButtons"
        (didDismiss)="setOpen(false)"
      ></ion-alert>

      <ion-label class="ion-text-center">¿Ya tienes una cuenta?</ion-label>
      <ion-button class="loginback" href="/login">Iniciar Sesión</ion-button>
    </ion-card-header>
  </div>
</ion-content>
